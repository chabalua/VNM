<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>VNM Sales · Redesign</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; color: #1c1b1a;
    font-family: "Inter", ui-sans-serif, system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  * { box-sizing: border-box; }
  #root { min-height: 100vh; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="tokens.jsx"></script>
<script type="text/babel" src="ui-primitives.jsx"></script>
<script type="text/babel" src="mobile-screens.jsx"></script>
<script type="text/babel" src="desktop-screens.jsx"></script>
<script type="text/babel" src="desktop-screens-2.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "dark": false,
  "accent": "#2563EB",
  "font": "inter",
  "density": "regular"
}/*EDITMODE-END*/;

function App() {
  const [tw, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const tokens = resolveTokens({ dark: tw.dark, accent: tw.accent });
  const t = { ...tokens, dark: tw.dark };
  const fontFamily = FONT_STACKS[tw.font] || FONT_STACKS.inter;

  React.useEffect(() => {
    document.body.style.background = t.bg;
    document.body.style.color = t.text;
    document.body.style.fontFamily = fontFamily;
  }, [t.bg, t.text, fontFamily]);

  return (
    <div style={{ fontFamily, color: t.text }}>
      <DesignCanvas>
        <DCSection id="desktop" title="Desktop · 1280×820"
          subtitle="Layout chuyên nghiệp với sidebar, sạch sẽ tối giản kiểu Linear/Notion">
          <DCArtboard id="d-home" label="Trang chủ · KPI Dashboard" width={DT_W} height={DT_H}>
            <DesktopHome t={t}/>
          </DCArtboard>
          <DCArtboard id="d-order" label="Đặt hàng" width={DT_W} height={DT_H}>
            <DesktopOrder t={t}/>
          </DCArtboard>
          <DCArtboard id="d-order-detail" label="Đặt hàng · Chi tiết giá (expand)" width={DT_W} height={DT_H}>
            <DesktopOrderExpanded t={t}/>
          </DCArtboard>
          <DCArtboard id="d-customers" label="Khách hàng" width={DT_W} height={DT_H}>
            <DesktopCustomers t={t}/>
          </DCArtboard>
          <DCArtboard id="d-orders" label="Đơn hàng (lịch sử)" width={DT_W} height={DT_H}>
            <DesktopOrders t={t}/>
          </DCArtboard>
          <DCArtboard id="d-ctkm" label="Chương trình KM (CTKM)" width={DT_W} height={DT_H}>
            <DesktopCTKM t={t}/>
          </DCArtboard>
          <DCArtboard id="d-settings" label="Cài đặt và vận hành" width={DT_W} height={DT_H}>
            <DesktopSettings t={t}/>
          </DCArtboard>
        </DCSection>

        <DCSection id="mobile" title="Mobile · iPhone 13 (390×844)"
          subtitle="Thiết kế cho thị trường — bottom tab bar, thumb-friendly, hierarchy rõ ràng">
          <DCArtboard id="m-home" label="Trang chủ" width={406} height={860}>
            <MobileHome t={t} density={tw.density}/>
          </DCArtboard>
          <DCArtboard id="m-order" label="Đặt hàng" width={406} height={860}>
            <MobileOrder t={t}/>
          </DCArtboard>
          <DCArtboard id="m-customers" label="Khách hàng" width={406} height={860}>
            <MobileCustomers t={t}/>
          </DCArtboard>
          <DCArtboard id="m-ai" label="AI Assistant" width={406} height={860}>
            <MobileAI t={t}/>
          </DCArtboard>
          <DCArtboard id="m-settings" label="Cài đặt" width={406} height={860}>
            <MobileSettings t={t}/>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel>
        <TweakSection label="Giao diện"/>
        <TweakToggle label="Chế độ tối" value={tw.dark}
          onChange={(v) => setTweak('dark', v)}/>
        <TweakColor label="Màu nhấn" value={tw.accent}
          onChange={(v) => setTweak('accent', v)}/>

        <TweakSection label="Typography"/>
        <TweakSelect label="Font" value={tw.font}
          options={[
            { value: 'inter', label: 'Inter' },
            { value: 'geist', label: 'Geist' },
            { value: 'ibm', label: 'IBM Plex Sans' },
            { value: 'manrope', label: 'Manrope' },
            { value: 'system', label: 'System UI' },
          ]}
          onChange={(v) => setTweak('font', v)}/>

        <TweakSection label="Mật độ"/>
        <TweakRadio label="Density" value={tw.density}
          options={['compact', 'regular', 'comfy']}
          onChange={(v) => setTweak('density', v)}/>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
