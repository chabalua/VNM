<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KM Engine Tests</title>
<style>
body {
  font-family: "Segoe UI", sans-serif;
  padding: 24px;
  margin: 0 auto;
  max-width: 1080px;
  background: #f8fafc;
  color: #0f172a;
}
h1 {
  margin: 0 0 8px;
}
.meta {
  margin-bottom: 18px;
  color: #475569;
}
.summary {
  padding: 14px 16px;
  border-radius: 12px;
  font-weight: 700;
  margin-bottom: 18px;
}
.summary.pass {
  background: #dcfce7;
  color: #166534;
}
.summary.fail {
  background: #fee2e2;
  color: #991b1b;
}
.group {
  background: #ffffff;
  border: 1px solid #e2e8f0;
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 14px;
}
.group h2 {
  margin: 0 0 10px;
  font-size: 18px;
}
.result {
  padding: 6px 0;
  border-top: 1px solid #f1f5f9;
}
.result:first-of-type {
  border-top: 0;
}
.pass {
  color: #166534;
}
.fail {
  color: #b91c1c;
  font-weight: 700;
}
.hint {
  margin-top: 18px;
  color: #475569;
  font-size: 14px;
}
code {
  font-family: Consolas, monospace;
}
</style>
</head>
<body>
<h1>KM Engine Tests</h1>
<div class="meta">Suite nay chay truc tiep tren <code>js/config.js</code> va <code>js/cart.js</code>, khong dung ban sao logic.</div>
<div id="summary" class="summary"></div>
<div id="results"></div>
<div class="hint">Mo file nay trong browser de xem nhanh. De chay tu terminal, dung <code>node tests/km-engine.test.js</code>.</div>

<script src="../js/config.js"></script>
<script src="../js/cart.js"></script>
<script src="./km-engine.test.shared.js"></script>
<script>
var result = runKmEngineTests(window);
var summary = document.getElementById('summary');
summary.className = 'summary ' + (result.failed ? 'fail' : 'pass');
summary.textContent = result.passed + '/' + result.total + ' tests passed' + (result.failed ? ' - ' + result.failed + ' failed' : ' - all green');

var groups = {};
result.tests.forEach(function(test) {
  if (!groups[test.group]) groups[test.group] = [];
  groups[test.group].push(test);
});

var html = '';
Object.keys(groups).forEach(function(groupName) {
  html += '<section class="group"><h2>' + groupName + '</h2>';
  groups[groupName].forEach(function(test) {
    html += '<div class="result ' + (test.pass ? 'pass' : 'fail') + '">' +
      (test.pass ? 'PASS' : 'FAIL') + ' - ' + test.name +
      (test.pass ? '' : ' :: ' + test.error) +
      '</div>';
  });
  html += '</section>';
});

document.getElementById('results').innerHTML = html;
</script>
</body>
</html>
